# Forced overseer smoke test configuration
# Uses null_model_type: overseer_smoke to guarantee overseer_scout invocation
# Minimal settings for fast deterministic smoke run

initial_zod: 50
decay_rate_per_turn: 1.0
max_turns: 5
starvation_turns: 3
memory_path: .sisyphus/memory

model_name: hf.co/bartowski/Qwen_Qwen3-30B-A3B-Instruct-2507-GGUF:IQ3_XS
ollama_base_url: http://localhost:11434
default_temperature: 0.7
llm_backend: ollama
openai_api_base_url: https://api.z.ai/api/coding/paas/v4
openai_api_key_env_var: ZAI_API_KEY
openai_model_name: glm-5

docker_image: python:3.12-slim
docker_mem_limit: 256m
docker_cpu_quota: 50000
docker_storage_limit: 512m

economy_mode: visible
file_drop_lambda: 0.1
file_drop_interval_turns: 2
max_turns_per_tool: 1
turn_timeout_seconds: 30
max_consecutive_empty_turns: 3
context_window_tokens: 4096
context_summary_interval_turns: 20

tool_costs:
  file_read: 0.0
  file_write: 0.5
  file_list: 0.1
  shell_exec: 1.0
  python_exec: 1.0
  http_request: 1.0
  overseer_scout: 0.15
  check_balance: 0.0
  self_modify: 0.2
  get_env_info: 0.0
  send_message: 0.0
  read_messages: 0.0
  pass_turn: 0.01

degradation_tiers:
  premium: 0.6
  balanced: 0.3
  eco: 0.0

num_file_families: 2
validator_scoring_weights:
  csv: 1.0
  json: 1.0
  log: 1.0
zod_rewards:
  easy: 10.0
  hard: 20.0

# CRITICAL: This enables forced overseer_scout emission in NullModel
null_model_type: overseer_smoke

overseer_scout_cost: 0.15
overseer_scout_calls_per_turn: 1
overseer_scout_daily_budget: 3
force_first_overseer_scout: true
overseer_search_provider: duckduckgo_instant_answer
overseer_search_base_url: https://api.duckduckgo.com/
overseer_search_user_agent: PetriDish-Overseer/1.0 (+read-only scout)
overseer_search_timeout_seconds: 5
overseer_search_max_queries_per_call: 1
overseer_search_max_related_topics: 2
overseer_search_chars_per_result: 1000
overseer_search_allow_redirects: false
overseer_search_blocked_domains:
  - localhost
  - 127.0.0.1
  - 0.0.0.0
  - local

multi_agent_enabled: false
multi_agent_count: 1
multi_agent_models: []
multi_agent_names: []
multi_agent_shared_filesystem: true
multi_agent_actions_per_turn: 2
multi_agent_death_forfeit_pct: 0.6
multi_agent_decay_pct: 0.3
multi_agent_salvage_pct: 0.3
multi_agent_reentry_fee: 10
multi_agent_spectator_rounds: 1
multi_agent_debt_garnish_pct: 0.5

endorphin_enabled: false
endorphin_ema_alpha: 0.3
endorphin_decay_factor: 0.95
endorphin_rebirth_factor: 0.85
endorphin_instinct_threshold: 0.3
