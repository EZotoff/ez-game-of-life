<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petri Dish - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#141E30',
                            900: '#0F172A',
                            950: '#0B1120',
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0F172A;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 h-screen overflow-hidden flex flex-col font-sans">

    <header class="bg-slate-900 border-b border-slate-800 p-4 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse" id="status-indicator"></div>
            <h1 class="text-xl font-bold text-white tracking-tight">Petri Dish <span class="text-slate-500 font-normal text-sm ml-2">Agent Simulation Environment</span></h1>
        </div>
        
        <div class="flex items-center gap-4">
            <select id="run-selector" class="bg-slate-800 border border-slate-700 text-sm rounded-md px-3 py-1.5 focus:outline-none focus:border-indigo-500 text-slate-200 min-w-[200px]">
                <option value="">Loading runs...</option>
            </select>
            <div class="text-sm font-medium bg-slate-800 px-4 py-1.5 rounded-md border border-slate-700">
                Balance: <span id="current-balance" class="text-emerald-400 font-mono text-lg">0.00</span> 
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-hidden p-6 flex flex-col gap-6">
        
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 shrink-0 h-64">
            
            <div class="lg:col-span-3 bg-slate-900 border border-slate-800 rounded-lg p-4 flex flex-col relative">
                <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Credit Balance Trajectory</h2>
                <div class="flex-1 relative w-full">
                    <canvas id="balanceChart"></canvas>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-lg p-5 flex flex-col justify-center gap-6 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/5 rounded-full blur-2xl"></div>
                
                <div>
                    <div class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Total Files Dropped</div>
                    <div id="stat-dropped" class="text-3xl font-light text-white font-mono">0</div>
                </div>
                
                <div>
                    <div class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Files Processed</div>
                    <div class="flex items-end gap-2">
                        <div id="stat-processed" class="text-3xl font-light text-emerald-400 font-mono">0</div>
                        <div class="text-sm text-slate-500 mb-1">completed</div>
                    </div>
                </div>

                <div>
                    <div class="text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Credits Earned</div>
                    <div class="flex items-end gap-2">
                        <div id="stat-earned" class="text-3xl font-light text-indigo-400 font-mono">0.00</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 bg-slate-900 border border-slate-800 rounded-lg flex flex-col overflow-hidden">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center shrink-0">
                <h2 class="text-xs font-semibold uppercase tracking-wider text-slate-500">Action History</h2>
                <div class="flex items-center gap-2">
                    <label class="text-xs text-slate-400 flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" id="auto-scroll" checked class="rounded border-slate-700 bg-slate-800 text-indigo-500">
                        Auto-scroll
                    </label>
                </div>
            </div>
            
            <div class="flex-1 overflow-auto custom-scrollbar p-0 m-0" id="log-container">
                <table class="w-full text-left border-collapse text-sm">
                    <thead class="sticky top-0 bg-slate-900 shadow-sm z-10">
                        <tr>
                            <th class="py-3 px-4 font-medium text-slate-500 border-b border-slate-800 w-20">Turn</th>
                            <th class="py-3 px-4 font-medium text-slate-500 border-b border-slate-800 w-32">Time</th>
                            <th class="py-3 px-4 font-medium text-slate-500 border-b border-slate-800 w-48">Tool</th>
                            <th class="py-3 px-4 font-medium text-slate-500 border-b border-slate-800">Arguments / Result</th>
                            <th class="py-3 px-4 font-medium text-slate-500 border-b border-slate-800 w-24 text-right">Delta</th>
                        </tr>
                    </thead>
                    <tbody id="log-body" class="divide-y divide-slate-800/50">
                    </tbody>
                </table>
                <div id="empty-log" class="hidden p-8 text-center text-slate-500">No actions recorded yet.</div>
            </div>
        </div>
    </main>

    <script>
        let currentRunId = null;
        let eventSource = null;
        let chart = null;
        let chartData = { labels: [], balances: [] };
        let isHoveringLog = false;
        
        const runSelector = document.getElementById('run-selector');
        const currentBalanceEl = document.getElementById('current-balance');
        const logContainer = document.getElementById('log-container');
        const logBody = document.getElementById('log-body');
        const autoScrollCheckbox = document.getElementById('auto-scroll');
        const statusIndicator = document.getElementById('status-indicator');
        const emptyLog = document.getElementById('empty-log');
        
        const statDropped = document.getElementById('stat-dropped');
        const statProcessed = document.getElementById('stat-processed');
        const statEarned = document.getElementById('stat-earned');

        function initChart() {
            const ctx = document.getElementById('balanceChart').getContext('2d');
            
            Chart.defaults.color = '#64748b';
            Chart.defaults.font.family = 'ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif';
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.labels,
                    datasets: [{
                        label: 'Balance',
                        data: chartData.balances,
                        borderColor: '#818cf8',
                        backgroundColor: 'rgba(129, 140, 248, 0.1)',
                        borderWidth: 2,
                        pointRadius: 0,
                        pointHoverRadius: 4,
                        fill: true,
                        tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 0 },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleColor: '#e2e8f0',
                            bodyColor: '#e2e8f0',
                            borderColor: '#334155',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    return ` Balance: ${context.parsed.y.toFixed(2)}`;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#1e293b', drawBorder: false },
                            ticks: { maxTicksLimit: 10 }
                        },
                        y: {
                            grid: { color: '#1e293b', drawBorder: false },
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function updateChart(txs) {
            txs.forEach(tx => {
                const date = new Date(tx.timestamp);
                const timeStr = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}:${date.getSeconds().toString().padStart(2, '0')}`;
                chartData.labels.push(timeStr);
                chartData.balances.push(tx.balance_after);
            });
            chart.update();
            
            if (chartData.balances.length > 0) {
                currentBalanceEl.textContent = chartData.balances[chartData.balances.length - 1].toFixed(2);
            }
        }

        function formatArgs(args) {
            if (!args) return '<span class="text-slate-600 italic">none</span>';
            try {
                if (typeof args === 'string') args = JSON.parse(args);
                return `<pre class="text-[11px] text-slate-400 font-mono mt-1 overflow-hidden text-ellipsis">${JSON.stringify(args)}</pre>`;
            } catch (e) {
                return `<span class="text-slate-400">${args}</span>`;
            }
        }

        function appendActions(actions) {
            if (actions.length > 0) {
                emptyLog.style.display = 'none';
            }
            
            actions.forEach(action => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-800/50 transition-colors group';
                
                const date = new Date(action.timestamp);
                const timeStr = `${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}:${date.getSeconds().toString().padStart(2, '0')}`;
                
                const delta = action.credits_after - action.credits_before;
                let deltaClass = 'text-slate-500';
                let deltaPrefix = '';
                if (delta > 0.001) { deltaClass = 'text-emerald-400'; deltaPrefix = '+'; }
                else if (delta < -0.001) { deltaClass = 'text-rose-400'; deltaPrefix = ''; }

                let toolColor = 'bg-slate-800 text-slate-300';
                if (action.tool_name.includes('file')) toolColor = 'bg-blue-500/10 text-blue-400';
                if (action.tool_name.includes('shell')) toolColor = 'bg-orange-500/10 text-orange-400';
                if (action.tool_name === 'error' || action.tool_name.includes('invalid')) toolColor = 'bg-rose-500/10 text-rose-400';

                let resultSnippet = action.result ? action.result.substring(0, 100) : '';
                if (action.result && action.result.length > 100) resultSnippet += '...';
                
                tr.innerHTML = `
                    <td class="py-2 px-4 font-mono text-slate-400">${action.turn}</td>
                    <td class="py-2 px-4 text-slate-500 text-xs">${timeStr}</td>
                    <td class="py-2 px-4">
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium ${toolColor} border border-slate-700/50">
                            ${action.tool_name}
                        </span>
                    </td>
                    <td class="py-2 px-4">
                        <div class="flex flex-col gap-1 max-w-2xl">
                            ${formatArgs(action.tool_args)}
                            ${resultSnippet ? `<div class="text-[11px] text-slate-500 truncate group-hover:whitespace-normal group-hover:break-all">${resultSnippet}</div>` : ''}
                        </div>
                    </td>
                    <td class="py-2 px-4 text-right font-mono text-xs ${deltaClass}">
                        ${deltaPrefix}${delta.toFixed(2)}
                    </td>
                `;
                logBody.appendChild(tr);
            });

            if (autoScrollCheckbox.checked && !isHoveringLog) {
                logContainer.scrollTop = logContainer.scrollHeight;
            }
        }

        function updateStats(stats) {
            statDropped.textContent = stats.total_files || 0;
            statProcessed.textContent = stats.processed_files || 0;
            statEarned.textContent = (stats.total_credits_earned || 0).toFixed(2);
        }

        async function fetchRuns() {
            try {
                const res = await fetch('/api/runs');
                const runs = await res.json();
                
                runSelector.innerHTML = '';
                if (runs.length === 0) {
                    runSelector.innerHTML = '<option value="">No runs found</option>';
                    return null;
                }
                
                runs.forEach((run, i) => {
                    const option = document.createElement('option');
                    option.value = run.run_id;
                    const date = new Date(run.start_time).toLocaleString();
                    option.textContent = `${date} (${run.run_id.substring(0,8)}...)`;
                    runSelector.appendChild(option);
                });
                
                return runs[0].run_id;
            } catch (e) {
                console.error("Failed to fetch runs:", e);
                return null;
            }
        }

        async function loadHistoricalData(runId) {
            chartData.labels = [];
            chartData.balances = [];
            logBody.innerHTML = '';
            emptyLog.style.display = 'block';
            chart.update();

            const [actionsRes, balanceRes, summaryRes, filesRes] = await Promise.all([
                fetch(`/api/runs/${runId}/actions`),
                fetch(`/api/runs/${runId}/balance`),
                fetch(`/api/runs/${runId}/summary`),
                fetch(`/api/runs/${runId}/files`)
            ]);

            const actions = await actionsRes.json();
            const balances = await balanceRes.json();
            
            appendActions(actions.reverse());
            updateChart(balances);
        }

        function setupSSE(runId) {
            if (eventSource) {
                eventSource.close();
            }

            statusIndicator.className = 'w-3 h-3 rounded-full bg-amber-500 animate-pulse';

            const url = runId ? `/api/events?run_id=${runId}` : '/api/events';
            eventSource = new EventSource(url);

            eventSource.onopen = () => {
                statusIndicator.className = 'w-3 h-3 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.5)]';
            };

            eventSource.addEventListener('actions', (e) => {
                const actions = JSON.parse(e.data);
                appendActions(actions);
            });

            eventSource.addEventListener('balance', (e) => {
                const txs = JSON.parse(e.data);
                updateChart(txs);
            });

            eventSource.addEventListener('file_stats', (e) => {
                const stats = JSON.parse(e.data);
                updateStats(stats);
            });

            eventSource.onerror = () => {
                statusIndicator.className = 'w-3 h-3 rounded-full bg-rose-500';
            };
        }

        async function init() {
            initChart();
            
            logContainer.addEventListener('mouseenter', () => isHoveringLog = true);
            logContainer.addEventListener('mouseleave', () => isHoveringLog = false);

            const initialRunId = await fetchRuns();
            if (initialRunId) {
                currentRunId = initialRunId;
                runSelector.value = initialRunId;
                await loadHistoricalData(initialRunId);
                setupSSE(initialRunId);
            }

            runSelector.addEventListener('change', async (e) => {
                const newRunId = e.target.value;
                if (newRunId && newRunId !== currentRunId) {
                    currentRunId = newRunId;
                    await loadHistoricalData(newRunId);
                    setupSSE(newRunId);
                }
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
